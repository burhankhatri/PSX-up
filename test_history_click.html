<!DOCTYPE html>
<html>
<head>
    <title>Test History Click</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .history-item { 
            padding: 10px; 
            margin: 5px 0; 
            border: 1px solid #ccc; 
            cursor: pointer;
            background: #f9f9f9;
        }
        .history-item:hover { background: #e9e9e9; }
        #log { 
            margin-top: 20px; 
            padding: 10px; 
            background: #f0f0f0; 
            border: 1px solid #999;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>History Click Test</h1>
    <p>Open the browser console (F12) to see detailed logs</p>
    
    <div id="historyList">
        <div class="sidebar-history-item" data-fileuri="PPL_research_predictions_2026.json" role="button" tabindex="0">
            PPL - +15.2%
        </div>
        <div class="sidebar-history-item" data-fileuri="LUCK_research_predictions_2026.json" role="button" tabindex="0">
            LUCK - +8.5%
        </div>
        <div class="sidebar-history-item" data-fileuri="PSO_research_predictions_2026.json" role="button" tabindex="0">
            PSO - +12.1%
        </div>
    </div>
    
    <div id="log">Log will appear here...</div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        const logDiv = document.getElementById('log');
        
        function log(msg) {
            console.log(msg);
            logDiv.textContent += new Date().toISOString() + ' - ' + msg + '\n';
        }
        
        async function loadFromFile(filename) {
            log('loadFromFile called with: ' + filename);
            try {
                const url = `${API_BASE}/api/history/${encodeURIComponent(filename)}`;
                log('Fetching: ' + url);
                
                const res = await fetch(url);
                log('Response status: ' + res.status);
                
                const data = await res.json();
                log('Data received for symbol: ' + (data.symbol || 'UNKNOWN'));
                log('Has daily_predictions: ' + ('daily_predictions' in data));
                
                if (!res.ok) {
                    log('ERROR: ' + (data.detail || 'Unknown error'));
                    alert('Error: ' + (data.detail || 'Unknown error'));
                    return;
                }
                
                log('SUCCESS! Would now render results for ' + data.symbol);
            } catch (e) {
                log('EXCEPTION: ' + e.message);
                console.error(e);
                alert('Exception: ' + e.message);
            }
        }
        
        // Attach listeners
        (function() {
            const list = document.getElementById('historyList');
            log('Attaching listeners to historyList');
            
            list.addEventListener('click', function(e) {
                log('Click detected, target: ' + e.target.className);
                const item = e.target.closest('.sidebar-history-item[data-fileuri]');
                log('Found item: ' + (item ? 'YES' : 'NO'));
                if (!item) return;
                const fileUri = item.getAttribute('data-fileuri');
                log('File URI: ' + fileUri);
                if (fileUri) {
                    loadFromFile(decodeURIComponent(fileUri));
                }
            });
            
            log('Listeners attached successfully');
        })();
    </script>
</body>
</html>
